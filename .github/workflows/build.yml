name: Build and push to GHCR

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - handler.py
      - download_models.py
      - .github/workflows/build.yml
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Free up runner disk space
        # 默认 runner 只有 ~14GB free; 我们镜像 ~15GB，需要先清理
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                       /opt/hostedtoolcache/CodeQL "$AGENT_TOOLSDIRECTORY"
          docker image prune -af
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/runpod-serverless-multi:latest
            ghcr.io/${{ github.repository_owner }}/runpod-serverless-multi:${{ github.sha }}
          # buildx 默认有缓存，使用 GitHub Actions cache 后端
          cache-from: type=gha
          cache-to: type=gha,mode=max
